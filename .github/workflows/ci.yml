name: CI Pipeline

on:
  push:
    branches:
      - main
      - "day_*"
  pull_request:
    branches:
      - main
      - "day_*"

jobs:
  lint:
    name: Code Quality (flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Linter
        run: |
          flake8 tests/ conftest.py \
            --max-line-length=100 \
            --ignore=E302,W503

  test:
    name: Automated Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          pytest tests/ -v --tb=short
